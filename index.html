<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ACCESS - ARG</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0d0d0d;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 40px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 35px 55px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        button:hover {
            transform: translateY(-10px);
            filter: brightness(1.3);
        }

        .btn-purple { background-color: #8a2be2; color: white; box-shadow: 0 0 25px rgba(138, 43, 226, 0.6); }
        .btn-yellow { background-color: #ffd700; color: #222; box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); }
        .btn-pink { background-color: #ff69b4; color: white; box-shadow: 0 0 25px rgba(255, 105, 180, 0.6); }

        /* Стиль для видео (на весь экран) */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Видео сохранит пропорции */
        }

        /* Текст шифра */
        #cipher-display {
            display: none;
            font-size: 32px;
            text-align: center;
            line-height: 1.5;
            text-shadow: 0 0 15px #00ff00;
        }

        #bg-music { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="video-overlay">
        <video id="intro-video">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="main-ui" class="container">
        <button class="btn-purple" onclick="check('бревно', 'Ваша часть 1 - 27°46\'')">Меганайты</button>
        <button class="btn-yellow" onclick="check('стринги', 'Ваша часть 2 - 06.9&quot;N 82°')">Миньоны</button>
        <button class="btn-pink" onclick="check('ёкай', 'Ваша часть 3 - 46\'01.6&quot;W')">Хоррор</button>
    </div>

    <div id="cipher-display"></div>

    <script>
        const audio = document.getElementById('bg-music');
        const mainUi = document.getElementById('main-ui');
        const cipherDisplay = document.getElementById('cipher-display');
        const videoOverlay = document.getElementById('video-overlay');
        const video = document.getElementById('intro-video');

        audio.volume = 0.5;

        function check(correctPass, secretText) {
            audio.play().catch(() => {});

            let userPass = prompt("ВНИМАНИЕ: ТРЕБУЕТСЯ ПАРОЛЬ ДОСТУПА");

            if (userPass === null) return;

            if (userPass.toLowerCase().trim() === correctPass.toLowerCase()) {
                // 1. Прячем кнопки
                mainUi.style.display = 'none';
                
                // 2. Показываем и запускаем видео
                videoOverlay.style.display = 'block';
                video.play();

                // 3. Когда видео закончится
                video.onended = function() {
                    videoOverlay.style.display = 'none'; // Убираем видео
                    cipherDisplay.style.display = 'block'; // Показываем текст
                    cipherDisplay.innerHTML = secretText + "<br><br><span style='font-size:16px; color:gray; text-shadow:none;'>Запишите данные совместите 3 части</span>";
                };

            } else {
                alert("ОШИБКА: НЕВЕРНЫЙ ПАРОЛЬ.");
            }
        }
    </script>

</body>
</html>
